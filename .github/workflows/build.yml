name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Npcap SDK
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" -OutFile "npcap-sdk.zip"
          Expand-Archive "npcap-sdk.zip" -DestinationPath "npcap-sdk"

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build
        run: |
          cl /I "npcap-sdk\Include" main.c /link /LIBPATH:"npcap-sdk\Lib\x64" wpcap.lib ws2_32.lib /out:nothing_detector.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nothing_detector
          path: nothing_detector.exe
